<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>kacem B</title>
  <meta name="theme-color" content="#0b1220" />
  <link rel="manifest" href="manifest.json">

  <style>
    body{
      margin:0;
      background:#0b1220;
      color:white;
      font-family:system-ui;
    }
    .wrap{
      max-width:900px;
      margin:auto;
      padding:20px;
    }
    .card{
      background:#101a33;
      padding:15px;
      border-radius:12px;
      margin-top:15px;
    }
    .btn{
      padding:10px 15px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-weight:bold;
    }
    .primary{
      background:#2d6cff;
      color:white;
    }
    input{
      width:100%;
      padding:8px;
      margin-top:5px;
      border-radius:8px;
      border:none;
    }
  </style>
</head>

<body>

<div class="wrap">

  <!-- تسجيل الدخول -->
  <div id="loginCard" class="card">
    <h3>تسجيل دخول</h3>

    <label>البريد الإلكتروني</label>
    <input id="loginUser" type="email">

    <label style="margin-top:10px">كلمة السر</label>
    <input id="loginPass" type="password">

    <div style="margin-top:15px">
      <button id="btnLogin" class="btn primary">دخول</button>
      <button id="btnSignup" class="btn">إنشاء حساب</button>
    </div>
  </div>

  <!-- الصفحة الرئيسية -->
  <div id="homeArea" class="card" style="display:none">
    <h3>الصفحة الرئيسية</h3>
    <button id="btnLogout" class="btn">خروج</button>
  </div>

</div>

<!-- تحميل app.js (مهم يكون سطر واحد فقط) -->
<script type="module" src="./app.js?v=10"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js").catch(()=>{});
}
</script>

</body>
</html>
